<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heridas Tempranas — Un mapa para conocerte</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --paper: #f4ede0;
  --paper-warm: #ebe2d0;
  --paper-shadow: #e0d4ba;
  --ink: #1f2024;
  --ink-soft: #3a3b42;
  --ink-faint: #b8ad94;
  --cobalt: #2854a8;
  --cobalt-soft: #4a72c0;
  --vermillion: #c83c20;
  --vermillion-soft: #d8634a;
  --ochre: #d9a52a;
  --ochre-soft: #e6bc55;
  --emerald: #2d7548;
  --emerald-soft: #4a9165;
  --plum: #7a3458;
  --plum-soft: #985878;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background-color: var(--paper);
  background-image:
    radial-gradient(ellipse at 20% 15%, rgba(40,84,168,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 85%, rgba(200,60,32,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 30%, rgba(217,165,42,0.05) 0%, transparent 45%);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding: 32px 20px 80px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  position: relative;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(0.5px 0.5px at 10% 20%, rgba(31,32,36,0.08), transparent),
    radial-gradient(0.5px 0.5px at 80% 60%, rgba(31,32,36,0.06), transparent),
    radial-gradient(0.5px 0.5px at 30% 70%, rgba(31,32,36,0.07), transparent),
    radial-gradient(0.5px 0.5px at 60% 40%, rgba(31,32,36,0.05), transparent),
    radial-gradient(0.5px 0.5px at 90% 90%, rgba(31,32,36,0.06), transparent);
  opacity: 0.6;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}

.scribble-bg {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
}
.scribble-bg.s1 { top: 8%; left: 5%; }
.scribble-bg.s2 { top: 25%; right: 4%; }
.scribble-bg.s3 { bottom: 30%; left: 3%; }
.scribble-bg.s4 { bottom: 15%; right: 6%; }
.scribble-bg.s5 { top: 55%; left: 8%; }
.scribble-bg.s6 { top: 70%; right: 10%; }

.container { max-width: 660px; width: 100%; position: relative; z-index: 1; }

/* ── NAV ── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
  gap: 8px;
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-weight: 600;
  font-style: italic;
  color: var(--ink);
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.nav-logo-mark {
  width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
}
.nav-tabs {
  display: flex; gap: 2px;
  background: transparent;
  border: 1.5px solid var(--ink);
  border-radius: 0;
  padding: 3px;
}
.nav-tab {
  background: transparent;
  border: none;
  padding: 7px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 10px; letter-spacing: 1.8px;
  font-weight: 600; text-transform: uppercase;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-tab.active {
  background: var(--ink);
  color: var(--paper);
}
.nav-tab:hover:not(.active) { color: var(--ink); }

/* ── SHARED ── */
.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 600;
  font-family: 'Inter', sans-serif;
}
.eyebrow-line {
  width: 24px; height: 1px;
  background: var(--ink-soft);
}

.btn-primary {
  background: var(--ink); color: var(--paper);
  font-family: 'Inter', sans-serif;
  font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
  border: none; padding: 17px 40px;
  border-radius: 0;
  cursor: pointer; transition: all 0.25s;
  display: inline-flex; align-items: center; gap: 12px;
  position: relative;
}
.btn-primary:hover { background: var(--ink-soft); transform: translate(-2px,-2px); box-shadow: 4px 4px 0 var(--ink-faint); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary:disabled:hover { background: var(--ink); transform: none; box-shadow: none; }
.btn-primary .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ochre); flex-shrink: 0; }

.btn-ghost {
  background: transparent; border: 1.5px solid var(--ink);
  color: var(--ink); font-family: 'Inter', sans-serif;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
  padding: 13px 26px; border-radius: 0; cursor: pointer; transition: all 0.25s;
}
.btn-ghost:hover { background: var(--ink); color: var(--paper); }

.btn-back {
  background: transparent; border: 1.5px solid var(--ink-faint);
  color: var(--ink-soft); font-family: 'Inter', sans-serif;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
  padding: 8px 14px; border-radius: 0; cursor: pointer; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-back:hover { border-color: var(--ink); color: var(--ink); }

/* ── INTRO ── */
.intro { animation: fadeUp 0.7s ease both; }
.intro-mark {
  display: flex; justify-content: center;
  margin-bottom: 24px;
}
.intro h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(38px, 9vw, 60px);
  font-weight: 500;
  font-style: italic;
  color: var(--ink); line-height: 1.05;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.intro h1 .accent {
  font-style: normal;
  font-weight: 600;
  position: relative;
  display: inline-block;
}
.intro h1 .accent::after {
  content: '';
  position: absolute;
  left: -2px; right: -2px;
  bottom: 4px; height: 8px;
  background: var(--ochre);
  z-index: -1;
  opacity: 0.5;
  transform: skewX(-3deg);
}
.intro-eyebrow-wrap {
  display: flex; justify-content: center;
  margin-bottom: 18px;
}
.intro-subtitle {
  font-size: 16px; line-height: 1.65;
  color: var(--ink-soft);
  max-width: 480px; margin: 16px auto 36px;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 19px;
}

.intro-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin: 0 0 32px; text-align: left;
}
.intro-tile {
  background: rgba(255,253,247,0.6);
  border: 1.5px solid var(--ink);
  padding: 18px 18px 16px;
  position: relative;
}
.intro-tile-mark {
  position: absolute;
  top: -10px; left: 14px;
  background: var(--paper);
  padding: 0 8px;
}
.intro-tile-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 700;
  margin-bottom: 10px;
  font-family: 'Inter', sans-serif;
}
.intro-tile p {
  font-size: 13px; line-height: 1.55;
  color: var(--ink-soft);
}

.intro-cta-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 14px;
}

/* ── ONBOARDING (name + gender) ── */
.onboarding {
  animation: fadeUp 0.5s ease both;
}
.onboarding-header {
  text-align: center;
  margin-bottom: 28px;
}
.onboarding-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 6vw, 38px);
  font-weight: 500;
  font-style: italic;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: 10px;
}
.onboarding-header p {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-style: italic;
  color: var(--ink-soft);
  max-width: 440px;
  margin: 12px auto 0;
  line-height: 1.5;
}
.onboarding-block {
  background: rgba(255,253,247,0.6);
  border: 1.5px solid var(--ink);
  padding: 28px 26px;
  margin-bottom: 20px;
  position: relative;
}
.onboarding-block::before {
  content: '';
  position: absolute;
  top: -1.5px; left: -1.5px; width: 28px; height: 28px;
  border-top: 4px solid var(--ochre);
  border-left: 4px solid var(--ochre);
}
.onboarding-label {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 700;
  margin-bottom: 14px;
  font-family: 'Inter', sans-serif;
}
.onboarding-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--ink-faint);
  padding: 8px 0 10px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.onboarding-input:focus { border-bottom-color: var(--ink); }
.onboarding-input::placeholder { color: var(--ink-faint); font-style: italic; }

.gender-options {
  display: flex; flex-direction: column;
  gap: 8px;
}
.gender-option {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px;
  background: transparent;
  border: 1.5px solid var(--ink-faint);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  color: var(--ink-soft);
  text-align: left;
  font-weight: 500;
}
.gender-option:hover {
  border-color: var(--ink);
  color: var(--ink);
}
.gender-option.selected {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}
.gender-mark {
  width: 12px; height: 12px;
  border: 1.5px solid currentColor;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}
.gender-option.selected .gender-mark::after {
  content: '';
  position: absolute;
  inset: 2px;
  background: var(--ochre);
  border-radius: 50%;
}

.onboarding-note {
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--ink-soft);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  margin-top: 10px;
}

/* ── QUIZ ── */
.quiz { animation: fadeUp 0.5s ease both; }
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 28px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--ink-faint);
}
.quiz-counter {
  font-family: 'Inter', sans-serif;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 600;
}
.quiz-counter-num {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 22px;
  color: var(--ink);
  margin-right: 4px;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: var(--paper-shadow);
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--ink);
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.q-block {
  background: rgba(255,253,247,0.5);
  border: 1.5px solid var(--ink);
  padding: 32px 28px 28px;
  margin-bottom: 24px;
  position: relative;
}
.q-block::before {
  content: '';
  position: absolute;
  top: -1.5px; left: -1.5px; width: 32px; height: 32px;
  border-top: 4px solid var(--ochre);
  border-left: 4px solid var(--ochre);
}
.q-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  line-height: 1.4;
  color: var(--ink);
  font-weight: 500;
  margin-bottom: 24px;
}

.likert {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.likert-option {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: transparent;
  border: 1.5px solid var(--ink-faint);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  color: var(--ink-soft);
  text-align: left;
  font-weight: 500;
}
.likert-option:hover {
  border-color: var(--ink);
  color: var(--ink);
  transform: translateX(4px);
}
.likert-option.selected {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}
.likert-mark {
  width: 14px; height: 14px;
  border: 1.5px solid currentColor;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}
.likert-option.selected .likert-mark::after {
  content: '';
  position: absolute;
  inset: 2px;
  background: var(--ochre);
  border-radius: 50%;
}

.quiz-nav {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
  margin-top: 24px;
}
.quiz-nav-dots {
  display: flex; flex-wrap: wrap; gap: 6px;
  flex: 1; justify-content: center;
}

.quiz-prev-next {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-top: 20px;
}
.btn-step {
  background: transparent;
  border: 1.5px solid var(--ink);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 11px; letter-spacing: 1.8px; text-transform: uppercase;
  font-weight: 600;
  padding: 11px 18px;
  border-radius: 0;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-step:hover:not(:disabled) {
  background: var(--ink);
  color: var(--paper);
}
.btn-step:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  border-color: var(--ink-faint);
  color: var(--ink-faint);
}
.btn-step .step-arrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-style: italic;
}

.quiz-nav-hint {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 10px;
  opacity: 0.7;
}
.qdot {
  width: 8px; height: 8px;
  border: 1.5px solid var(--ink-faint);
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.qdot.answered { background: var(--ink); border-color: var(--ink); }
.qdot.current { border-color: var(--vermillion); background: var(--vermillion); transform: scale(1.4); }

/* ── BRIDGE / VALIDATION ── */
.bridge {
  animation: fadeUp 1s ease both;
  text-align: center;
  padding: 40px 20px;
}
.bridge-mark {
  display: flex; justify-content: center;
  margin-bottom: 28px;
}
.bridge h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 6vw, 38px);
  font-weight: 500;
  font-style: italic;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 20px;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}
.bridge-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  line-height: 1.65;
  color: var(--ink-soft);
  max-width: 460px;
  margin: 0 auto 24px;
  font-weight: 400;
}
.bridge-text + .bridge-text {
  margin-top: -8px;
}
.bridge-line {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--vermillion);
  margin: 28px 0;
  font-weight: 500;
}
.bridge-cta {
  margin-top: 32px;
}

/* ── RESULT ── */
.result { animation: fadeUp 0.7s ease both; }
.result-header {
  text-align: center;
  margin-bottom: 36px;
}
.result-eyebrow-wrap {
  display: flex; justify-content: center;
  margin-bottom: 16px;
}
.result-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(30px, 7vw, 44px);
  font-weight: 500;
  font-style: italic;
  color: var(--ink);
  line-height: 1.1;
  margin-bottom: 10px;
}
.result-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-style: italic;
  color: var(--ink-soft);
  max-width: 460px;
  margin: 0 auto;
  line-height: 1.5;
}
.result-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--vermillion);
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* Constellation visualization */
.constellation-result {
  background: rgba(255,253,247,0.6);
  border: 1.5px solid var(--ink);
  padding: 28px 24px;
  margin-bottom: 28px;
  position: relative;
}
.constellation-result::before {
  content: '';
  position: absolute;
  top: -1.5px; right: -1.5px; width: 32px; height: 32px;
  border-top: 4px solid var(--cobalt);
  border-right: 4px solid var(--cobalt);
}
.constellation-label {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 600;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.constellation-help {
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--ink-soft);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px dashed var(--ink-faint);
}

/* Bars */
.bars {
  display: flex; flex-direction: column;
  gap: 14px;
  margin-top: 8px;
}
.bar-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
}
.bar-top {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
}
.bar-name-wrap {
  display: flex; align-items: baseline; gap: 8px;
  flex-wrap: wrap;
  min-width: 0;
}
.bar-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  font-style: italic;
}
.bar-tier {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 700;
  color: var(--ink-soft);
}
.bar-value {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
}
.bar-track {
  width: 100%; height: 10px;
  background: var(--paper-shadow);
  position: relative;
}
.bar-fill {
  height: 100%;
  transition: width 1s cubic-bezier(0.2,0.8,0.2,1);
  position: relative;
}

.tier-primary .bar-name { color: var(--ink); }
.tier-primary .bar-tier { color: var(--vermillion); }
.tier-secondary .bar-name { color: var(--ink); }
.tier-secondary .bar-tier { color: var(--ochre); }
.tier-latent .bar-name { color: var(--ink-soft); opacity: 0.85; }
.tier-latent .bar-tier { color: var(--ink-faint); }

/* Result sections */
.rsection {
  background: rgba(255,253,247,0.6);
  border: 1.5px solid var(--ink);
  padding: 26px 24px;
  margin-bottom: 18px;
  position: relative;
}
.rsection-corner {
  position: absolute;
  top: -1.5px; left: -1.5px; width: 28px; height: 28px;
  border-top: 4px solid;
  border-left: 4px solid;
}
.rsection-label {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.rsection-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  font-style: italic;
  color: var(--ink);
  margin-bottom: 12px;
  line-height: 1.2;
}
.rsection-text {
  font-size: 14.5px; line-height: 1.65;
  color: var(--ink-soft);
}
.rsection-text + .rsection-text {
  margin-top: 12px;
}
.rsection p strong {
  color: var(--ink);
  font-weight: 600;
}

.tipo-block {
  border-top: 1px dashed var(--ink-faint);
  padding-top: 22px;
  margin-top: 22px;
}
.tipo-block:first-of-type {
  border-top: none;
  padding-top: 0;
  margin-top: 0;
}
.tipo-block-head {
  display: flex; align-items: center;
  gap: 10px; margin-bottom: 10px;
  flex-wrap: wrap;
}
.tipo-block-name {
  font-family: 'Cormorant Garamond', serif;

// SISTEMA DE GÉNERO — plantillas con marcadores
// ────────────────────────────────────────────────
// Marcadores soportados:
//
//   {a/o}                            → 'a' en femenino, 'o' en masculino, 'o' por defecto en neutro (RAE)
//   {f:textoF|m:textoM|n:textoN}     → tres ramas explícitas
//
// Filosofía neutra: en vez de "e" (cansade/liste), usamos masculino genérico
// (forma RAE estándar) o reformulaciones impersonales cuando el contexto lo permite.

function flex(genderKey, template) {
  if (!template) return '';
  let out = template;

  // Patrón completo: {f:...|m:...|n:...}
  out = out.replace(/\{f:([^|}]*)\|m:([^|}]*)\|n:([^}]*)\}/g, (_, ff, mm, nn) => {
    if (genderKey === 'f') return ff;
    if (genderKey === 'm') return mm;
    return nn;
  });

  // Patrón corto: {a/o}
  out = out.replace(/\{a\/o\}/g, () => {
    if (genderKey === 'f') return 'a';
    if (genderKey === 'm') return 'o';
    return 'o';
  });

  return out;
}

// ────────────────────────────────────────────────
// SCORING (with normalization)
// ────────────────────────────────────────────────

function calcScores(){
  const raw = {};
  Object.keys(COLORS).forEach(k => raw[k] = 0);

  QUESTIONS.forEach((qq, idx) => {
    const a = answers[idx];
    if (a !== null) raw[qq.tipo] += a;
  });

  // Raw percentages (out of 30 max per type — 6 questions × 5)
  const rawPct = {};
  Object.keys(raw).forEach(k => {
    rawPct[k] = (raw[k] / 30) * 100;
  });

  // ── NORMALIZATION ──
  // To avoid the "everyone gets 60% if they answer 3 to everything" issue,
  // we normalize against the user's own mean response.
  // Method: compute mean response across all answers (1-5),
  // then for each type, compute deviation from that personal baseline.
  // The final score blends raw % with this deviation.

  const totalAnswers = answers.filter(a => a !== null);
  const personalMean = totalAnswers.length > 0
    ? totalAnswers.reduce((a,b) => a + b, 0) / totalAnswers.length
    : 3;

  // For each type, mean response per type
  const typeMeans = {};
  Object.keys(raw).forEach(k => {
    const typeAnswers = QUESTIONS
      .map((qq, idx) => qq.tipo === k ? answers[idx] : null)
      .filter(a => a !== null);
    typeMeans[k] = typeAnswers.length > 0
      ? typeAnswers.reduce((a,b) => a + b, 0) / typeAnswers.length
      : 0;
  });

  // Deviation from personal mean: positive = stronger than your average, negative = weaker
  // Scale: deviations of -2 to +2 (since responses are 1-5 and personal mean roughly 2-4)
  const deviations = {};
  Object.keys(typeMeans).forEach(k => {
    deviations[k] = typeMeans[k] - personalMean;
  });

  // Final score: weighted blend
  // 60% raw, 40% deviation-adjusted
  // Deviation gets translated: +2 deviation = +20%, -2 = -20%
  const finalPct = {};
  Object.keys(rawPct).forEach(k => {
    const adjusted = rawPct[k] + (deviations[k] * 12);
    finalPct[k] = Math.max(0, Math.min(100, Math.round(adjusted)));
  });

  return finalPct;
}

function tierFor(pct){
  if (pct >= 60) return 'primary';
  if (pct >= 35) return 'secondary';
  return 'latent';
}

function tierLabel(t){
  return t === 'primary' ? 'Primaria' : t === 'secondary' ? 'Secundaria' : 'Latente';
}

function allAnswered(){ return answers.every(a => a !== null); }
function answeredCount(){ return answers.filter(a => a !== null).length; }

// ────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────

function sortedScores(){
  const sc = calcScores();
  return Object.entries(sc)
    .map(([k,v]) => ({ key: k, pct: v, tier: tierFor(v) }))
    .sort((a,b) => b.pct - a.pct);
}

function go(s){ screen = s; showExitModal = false; render(); }
function goHome(){ q = 0; answers = new Array(QUESTIONS.length).fill(null); userName = ''; userGender = null; TIPOS = buildTipos('n'); showExitModal = false; resultView = 'chapters'; currentChapter = 0; go('intro'); }
function goResult(){ resultView = 'chapters'; currentChapter = 0; go('result'); }
function goBiblioteca(){ go('biblioteca'); }
function goDetail(key){ detailKey = key; go('detail'); }
function startOnboarding(){ go('onboarding'); }
function startQuiz(){
  if (!userGender) { go('onboarding'); return; }
  TIPOS = buildTipos(userGender);
  q = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  go('quiz');
}
function confirmExit(){ showExitModal = true; render(); }
function cancelExit(){ showExitModal = false; render(); }

function jumpToQ(idx){
  q = idx;
  render();
}

function selectAnswer(value){
  answers[q] = value;
  setTimeout(() => {
    let next = -1;
    for (let i = q + 1; i < QUESTIONS.length; i++) {
      if (answers[i] === null) { next = i; break; }
    }
    if (next === -1) {
      for (let i = 0; i < q; i++) {
        if (answers[i] === null) { next = i; break; }
      }
    }
    if (next === -1) {
      go('bridge');
      return;
    }
    q = next;
    render();
  }, 280);
}

function setName(value) {
  userName = value.trim();
  // re-render only the begin button state
  const btn = document.getElementById('onboard-begin');
  if (btn) {
    btn.disabled = !userGender;
  }
}

function setGender(g) {
  userGender = g;
  TIPOS = buildTipos(g);
  // visually update
  document.querySelectorAll('.gender-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.g === g);
  });
  const btn = document.getElementById('onboard-begin');
  if (btn) {
    btn.disabled = false;
  }
}

function handleNameInput(e) {
  setName(e.target.value);
}

function beginQuizFromOnboarding() {
  // capture current name from input field
  const input = document.getElementById('name-input');
  if (input) userName = input.value.trim();
  if (!userGender) return;
  TIPOS = buildTipos(userGender);
  q = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  go('quiz');
}

function renderQuiz(app){
  const question = QUESTIONS[q];
  const answeredPct = (answeredCount() / QUESTIONS.length) * 100;

  const dots = QUESTIONS.map((_, idx) => {
    const cls = answers[idx] !== null ? 'answered' : '';
    const cur = idx === q ? 'current' : '';
    return `<button class="qdot ${cls} ${cur}" onclick="jumpToQ(${idx})" aria-label="Ir a pregunta ${idx+1}"></button>`;
  }).join('');

  const options = LIKERT.map(opt => {
    const sel = answers[q] === opt.value ? 'selected' : '';
    return `<button class="likert-option ${sel}" onclick="selectAnswer(${opt.value})">
      <span class="likert-mark"></span>
      <span>${opt.label}</span>
    </button>`;
  }).join('');

  const prevDisabled = q === 0 ? 'disabled' : '';
  const nextDisabled = q === QUESTIONS.length - 1 ? 'disabled' : '';

  app.innerHTML = `
  <div class="quiz">
    <div class="quiz-header">

      <button class="btn-step" onclick="goPrev()" ${prevDisabled}>
        <span class="step-arrow">←</span>
        <span>Anterior</span>
      </button>
      <button class="btn-step" onclick="goNext()" ${nextDisabled}>
        <span>Siguiente</span>

function buildBarsHTML(sorted) {
  return sorted.map(s => {
    const tipo = TIPOS[s.key];
    const colorKey = COLORS[s.key];
    const color = COLOR_VALUES[colorKey];
    const tierClass = `tier-${s.tier}`;
    const tierTxt = tierLabel(s.tier);
    return `<div class="bar-row ${tierClass}">
      <div class="bar-top">
        <div class="bar-name-wrap">
          <span class="bar-name">${tipo.name}</span>
          <span class="bar-tier">· ${tierTxt}</span>
        </div>
        <span class="bar-value">${s.pct}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${s.pct}%;background:${color};"></div>
      </div>
    </div>`;
  }).join('');
}

function buildInterpretText(primary) {
  const namePrefix = userName ? userName + ', ' : '';
  if (primary.length === 0) {
    return `${namePrefix}tu perfil aparece bajo en todas las dimensiones. Eso puede leerse de varias maneras: creciste en un entorno suficientemente sostenedor, hay aspectos que aún no has tenido espacio para explorar, o respondiste con una voz interna más cauta de lo habitual. Las tres lecturas son válidas y vale la pena leer las dimensiones más altas con curiosidad.`;
  } else if (primary.length === 1) {
    const p = TIPOS[primary[0].key];
    return `${namePrefix}tu perfil tiene un eje claro: <strong>${p.name.toLowerCase()}</strong>. Es la herida que más estructura tus patrones actuales. Los otros tipos están presentes pero en menor intensidad —son matices, no protagonistas.`;
  } else if (primary.length === 2) {
    const p1 = TIPOS[primary[0].key];
    const p2 = TIPOS[primary[1].key];
    return `${namePrefix}tu perfil se mueve entre dos ejes principales: <strong>${p1.name.toLowerCase()}</strong> y <strong>${p2.name.toLowerCase()}</strong>. La combinación crea una textura particular —probablemente reconozcas patrones que nacen del cruce, no solo de cada uno por separado.`;
  } else {
    return `${namePrefix}tu perfil muestra varios ejes activos. Eso habla de un mapa interno complejo, multifacético. Vale la pena leer cada tipo por separado, y también notar cómo se entrelazan en tu vida cotidiana.`;
  }
}

  return `
    <div class="rsection">
      <div class="rsection-corner" style="border-color:${COLOR_VALUES.ochre};"></div>
      <div class="rsection-label">${dotMark('ochre')} Tus mecanismos de afrontamiento</div>
      <p class="rsection-text">Las estrategias que tu sistema desarrolló para protegerte. Fueron necesarias en su momento; entender de dónde vienen es el primer paso para elegir cuáles seguir usando y cuáles flexibilizar.</p>
      ${html}
    </div>`;
}

function sectionFortalezas(tiposToShow) {
  const html = buildFortalezasHTML(tiposToShow);
  return `
    <div class="rsection">
      <div class="rsection-corner" style="border-color:${COLOR_VALUES.emerald};"></div>
      <div class="rsection-label">${dotMark('emerald')} Lo que también nació de aquí</div>
      <p class="rsection-text">Cada herida construyó también una capacidad. Reconocerlo es honrar lo que aprendiste a hacer bien, sin idealizar el costo:</p>
      ${html}
    </div>`;
}

function sectionReparenting(tiposToShow) {
  const html = buildReparentingHTML(tiposToShow);
  return `
    <div class="rsection">
      <div class="rsection-corner" style="border-color:${COLOR_VALUES.cobalt};"></div>
      <div class="rsection-label">${dotMark('cobalt')} Tu ruta de reparenting</div>
      <p class="rsection-text"><em>Reparenting</em> es darte hoy lo que en su momento no recibiste —en prácticas pequeñas y repetidas, más que en grandes gestos. Es entrenamiento, más que insight. Estos pasos están priorizados según tus dimensiones más activas:</p>
      ${html}
    </div>`;
}

function sectionCierre(sorted) {
  const topTipo = TIPOS[sorted[0].key];
  return `
    <div class="closing-note">
      <div class="closing-note-label">${dotMark('vermillion')} Para llevarte</div>
      <p class="closing-question">"${topTipo.pregunta}"</p>
    </div>`;
}

// ── Definición de capítulos ──

function getChapters() {
  const sorted = sortedScores();
  const primary = sorted.filter(s => s.tier === 'primary');
  const activeTipos = sorted.filter(s => s.tier === 'primary' || s.tier === 'secondary');
  const tiposToShow = activeTipos.length > 0 ? activeTipos : sorted.slice(0, 2);

  return [
    { label: 'Tu constelación', render: () => sectionConstellation(sorted) + sectionMapa(sorted, primary) },
    { label: 'En tu vida hoy', render: () => sectionVidaAdulta(tiposToShow) },
    { label: 'Mecanismos', render: () => sectionCoping(tiposToShow) },
    { label: 'Fortalezas', render: () => sectionFortalezas(tiposToShow) },
    { label: 'Reparenting', render: () => sectionReparenting(tiposToShow) },
    { label: 'Para llevarte', render: () => sectionCierre(sorted) }
  ];
}

// ── Toggle helpers ──

function setResultView(view) {
  resultView = view;
  if (view === 'chapters') currentChapter = 0;
  render();
}

function goChapter(idx) {
  const chapters = getChapters();
  if (idx >= 0 && idx < chapters.length) {
    currentChapter = idx;
    render();
  }
}

function chapterPrev() {
  if (currentChapter > 0) {
    currentChapter -= 1;
    render();
  }
}

function chapterNext() {
  const chapters = getChapters();
  if (currentChapter < chapters.length - 1) {
    currentChapter += 1;
    render();
  }
}

// ── Render principal ──

function renderResult(app){
  const sorted = sortedScores();

  // Header común — siempre visible
  const headerHTML = `
    <div class="result-header">
      <div class="result-eyebrow-wrap">
        <div class="eyebrow"><span class="eyebrow-line"></span>Tu mapa<span class="eyebrow-line"></span></div>
      </div>
      ${userName ? `<span class="result-name">para ${userName}</span>` : ''}
      <h2>Tu constelación de heridas tempranas</h2>
      <p class="result-subtitle">Esto es lo que tu sistema parece haber aprendido. Es un mapa de tendencias —que pueden cambiar, y que son solo una parte de quién eres.</p>
    </div>`;

  // Toggle de vista — siempre visible
  const toggleHTML = `
    <div class="view-toggle">
      <button class="toggle-btn ${resultView === 'chapters' ? 'active' : ''}" onclick="setResultView('chapters')">
        <span class="toggle-icon">◐</span>
        <span>Por capítulos</span>
      </button>
      <button class="toggle-btn ${resultView === 'full' ? 'active' : ''}" onclick="setResultView('full')">
        <span class="toggle-icon">☰</span>
        <span>Todo en una página</span>
      </button>
    </div>`;

  // CTAs finales — siempre visibles
  const ctaHTML = `
    <div class="cta-row">
      <button class="btn-primary" onclick="goBiblioteca()">
        <span class="dot"></span>
        Explorar todos los tipos
      </button>
      <button class="btn-ghost" onclick="goHome()">Volver al inicio</button>
    </div>`;

  if (resultView === 'full') {
    // ── VISTA COMPLETA (sábana) ──
    const primary = sorted.filter(s => s.tier === 'primary');
    const activeTipos = sorted.filter(s => s.tier === 'primary' || s.tier === 'secondary');
    const tiposToShow = activeTipos.length > 0 ? activeTipos : sorted.slice(0, 2);

    app.innerHTML = `
    ${navBar()}
    <div class="result">
      ${headerHTML}
      ${toggleHTML}
      ${sectionConstellation(sorted)}
      ${sectionMapa(sorted, primary)}
      ${sectionVidaAdulta(tiposToShow)}
      ${sectionCoping(tiposToShow)}
      ${sectionFortalezas(tiposToShow)}
      ${sectionReparenting(tiposToShow)}
      ${sectionCierre(sorted)}
      ${ctaHTML}
    </div>`;
  } else {
    // ── VISTA POR CAPÍTULOS ──
    const chapters = getChapters();
    const chapter = chapters[currentChapter];
    const isFirst = currentChapter === 0;
    const isLast = currentChapter === chapters.length - 1;

    // Indicador de capítulos clickeable
    const chapterDots = chapters.map((c, idx) => {
      const cls = idx === currentChapter ? 'current' : (idx < currentChapter ? 'visited' : '');
      return `<button class="chapter-dot ${cls}" onclick="goChapter(${idx})" aria-label="Ir a capítulo ${idx + 1}: ${c.label}"></button>`;
    }).join('');

    const chapterHeader = `
      <div class="chapter-header">
        <div class="chapter-counter">
          <span class="chapter-counter-num">${String(currentChapter + 1).padStart(2,'0')}</span>
          <span class="chapter-counter-total">/ ${String(chapters.length).padStart(2,'0')}</span>
          <span class="chapter-counter-sep">·</span>
          <span class="chapter-counter-label">${chapter.label}</span>
        </div>
        <div class="chapter-dots">${chapterDots}</div>
      </div>`;

    const chapterNav = `
      <div class="chapter-nav">
        <button class="btn-step" onclick="chapterPrev()" ${isFirst ? 'disabled' : ''}>
          <span class="step-arrow">←</span>
          <span>Anterior</span>
        </button>
        <button class="btn-step" onclick="chapterNext()" ${isLast ? 'disabled' : ''}>
          <span>Siguiente</span>
          <span class="step-arrow">→</span>
        </button>
      </div>`;

    app.innerHTML = `
    ${navBar()}
    <div class="result result-chapters">
      ${headerHTML}
      ${toggleHTML}
      ${chapterHeader}
      <div class="chapter-content" key="ch-${currentChapter}">
        ${chapter.render()}
      </div>
      ${chapterNav}
      ${isLast ? ctaHTML : ''}
    </div>`;
  }
}

function renderBiblioteca(app){
  const cards = Object.entries(TIPOS).map(([key, tipo]) => {
    const colorKey = COLORS[key];
    const color = COLOR_VALUES[colorKey];
    return `<div class="tipo-card" onclick="goDetail('${key}')" style="border-top: 4px solid ${color};">
      <div class="tipo-card-subtitle">${tipo.subtitle}</div>
      <div class="tipo-card-name">${tipo.name}</div>
      <p class="tipo-card-preview">${tipo.preview}</p>
      <span class="tipo-card-arrow">→</span>
    </div>`;
  }).join('');

  app.innerHTML = `
  ${navBar('biblioteca')}
  <div class="biblioteca">
    <div class="biblioteca-header">
      <div class="intro-eyebrow-wrap">
        <div class="eyebrow"><span class="eyebrow-line"></span>Los 6 tipos<span class="eyebrow-line"></span></div>
      </div>
      <h2>Las heridas que aprendemos antes de saber.</h2>
      <p>Cada tipo es una forma sutil en que un sistema familiar puede haber dejado huella. La mayoría de personas reconocemos algo de varias. Tócalas para explorar.</p>
    </div>

    <div class="tipo-grid">${cards}</div>

    <div style="margin-top:36px;display:flex;justify-content:center;">
      <button class="btn-primary" onclick="${userGender ? 'startQuiz()' : 'startOnboarding()'}">
        <span class="dot"></span>
        Hacer el test
      </button>
    </div>
  </div>`;
}

function renderDetail(app){
  const tipo = TIPOS[detailKey];
  const colorKey = COLORS[detailKey];
  const color = COLOR_VALUES[colorKey];
  const keys = Object.keys(TIPOS);
  const idx = keys.indexOf(detailKey);
  const prev = keys[(idx - 1 + keys.length) % keys.length];
  const next = keys[(idx + 1) % keys.length];

  const reparentingHTML = tipo.reparenting.map(step => `
    <div class="reparenting-step" style="border-left-color:${color};">
      <div class="reparenting-step-num" style="color:${color};">${step.num}</div>
      <div class="reparenting-step-title">${step.title}</div>
      <p class="reparenting-step-text">${step.text}</p>
    </div>
  `).join('');

  app.innerHTML = `
  ${navBar('biblioteca')}
  <div class="tipo-detail">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <button class="btn-back" onclick="goBiblioteca()">← Todos los tipos</button>
      <div style="display:flex;gap:6px;">
        <button class="btn-back" onclick="goDetail('${prev}')">← Anterior</button>
        <button class="btn-back" onclick="goDetail('${next}')">Siguiente →</button>
      </div>
    </div>

    <div class="detail-header" style="border-top: 4px solid ${color};">
      <div class="detail-subtitle">${tipo.subtitle}</div>
      <h2>${tipo.name}</h2>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--ink-soft);max-width:480px;margin:14px auto 0;line-height:1.5;">${tipo.short}</p>
    </div>

    <div class="rsection">
      <div class="rsection-corner" style="border-color:${color};"></div>
      <div class="rsection-label">${dotMark(colorKey)} La huella</div>
      <p class="rsection-text">${tipo.descripcion}</p>
    </div>

    <div class="rsection">
      <div class="rsection-corner" style="border-color:${color};"></div>
      <div class="rsection-label">${dotMark(colorKey)} Cómo suele manifestarse</div>
      <p class="rsection-text">Maneras frecuentes en que esta herida aparece en la vida adulta:</p>
      <ul class="bullets ${colorKey}">
        ${tipo.en_la_vida_adulta_libreria.map(b => `<li>${b}</li>`).join('')}
      </ul>
    </div>

    <div class="rsection">
      <div class="rsection-corner" style="border-color:${color};"></div>
      <div class="rsection-label">${dotMark(colorKey)} Mecanismos de afrontamiento</div>
      <div class="coping-paragraph ${colorKey}">
        ${tipo.coping_paragraph}
      </div>
    </div>

    <div class="rsection">
      <div class="rsection-corner" style="border-color:${color};"></div>
      <div class="rsection-label">${dotMark(colorKey)} Lo que también nació de aquí</div>
      <p class="rsection-text">${tipo.fortalezas}</p>
    </div>

    <div class="rsection">
      <div class="rsection-corner" style="border-color:${color};"></div>
      <div class="rsection-label">${dotMark(colorKey)} Reparenting</div>
      <p class="rsection-text">Tres prácticas para empezar a darte lo que en su momento no recibiste:</p>
      ${reparentingHTML}
      <p class="practice-handwritten" style="color:${color};">${tipo.practica}</p>
    </div>

    <div class="integration-question" style="margin-top:18px;">
      <div class="integration-question-label">${dotMark(colorKey)} Pregunta para integrar</div>
      <p class="integration-question-text">"${tipo.pregunta}"</p>
    </div>

    <div class="cta-row">
      <button class="btn-primary" onclick="${userGender ? 'startQuiz()' : 'startOnboarding()'}">
        <span class="dot"></span>
        Hacer el test
      </button>
      <button class="btn-ghost" onclick="goBiblioteca()">← Volver a los tipos</button>
    </div>
  </div>`;
}

// Initial render
render();

</script>
</body>
</html>
